<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>File Assistant — Chat</title>
<style>
  :root {
    --bg:        #0e1116;
    --panel:     #161b22;
    --panel-2:   #1c232d;
    --border:    #2a313c;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --accent:    #4493f8;
    --accent-2:  #1f6feb;
    --user:      #1f6feb;
    --assistant: #1c232d;
    --badge-claude:   #d2a8ff;
    --badge-ollama:   #7ee787;
    --badge-retrieval:#8b949e;
    --danger:    #f85149;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex: 0 0 auto;
  }
  .title { font-weight: 600; font-size: 16px; letter-spacing: .2px; }
  .title small { color: var(--muted); font-weight: 400; margin-left: 8px; }

  /* Mode toggle */
  .mode {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mode .label { color: var(--muted); font-size: 13px; }
  .switch {
    display: inline-flex;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
  }
  .switch button {
    border: 0;
    background: transparent;
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all .15s ease;
  }
  .switch button.active {
    color: #fff;
    background: var(--accent-2);
  }
  .switch button:disabled { cursor: default; opacity: .7; }

  /* Chat area */
  main {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 24px 0;
  }
  .chat {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg { display: flex; flex-direction: column; max-width: 85%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 11px 14px;
    border-radius: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user .bubble {
    background: var(--user);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant .bubble {
    background: var(--assistant);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid var(--border);
  }
  .badge.claude    { color: var(--badge-claude);    border-color: #3d2d5c; }
  .badge.ollama    { color: var(--badge-ollama);    border-color: #1f3d24; }
  .badge.retrieval { color: var(--badge-retrieval); }
  .sources { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .source {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1px 7px;
    font-size: 11px;
    color: var(--text);
  }
  .snippet {
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .snippet .fn { color: var(--accent); font-weight: 600; display: block; margin-bottom: 2px; }
  .typing { color: var(--muted); font-style: italic; }

  /* Composer */
  footer {
    flex: 0 0 auto;
    border-top: 1px solid var(--border);
    background: var(--panel);
    padding: 14px 20px;
  }
  .composer {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  textarea {
    flex: 1 1 auto;
    resize: none;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    font: inherit;
    max-height: 160px;
    min-height: 44px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .send {
    background: var(--accent-2);
    color: #fff;
    border: 0;
    border-radius: 10px;
    padding: 0 20px;
    height: 44px;
    font-weight: 600;
    cursor: pointer;
  }
  .send:disabled { opacity: .5; cursor: default; }
  .hint { max-width: 820px; margin: 6px auto 0; color: var(--muted); font-size: 12px; }
  .empty { color: var(--muted); text-align: center; margin-top: 40px; }
  a.files-link { color: var(--accent); text-decoration: none; font-size: 13px; }
</style>
</head>
<body>
  <header>
    <div class="title">File Assistant <small id="backendInfo"></small></div>
    <div class="mode">
      <span class="label">Mode</span>
      <div class="switch" id="modeSwitch">
        <button data-mode="local">Local</button>
        <button data-mode="hetzner">Hetzner</button>
      </div>
      <a class="files-link" href="/files.html" title="File manager">Files →</a>
    </div>
  </header>

  <main id="main">
    <div class="chat" id="chat">
      <div class="empty" id="empty">Ask a question about your indexed files.</div>
    </div>
  </main>

  <footer>
    <div class="composer">
      <textarea id="input" placeholder="Send a message…  (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
      <button class="send" id="send">Send</button>
    </div>
    <div class="hint" id="hint"></div>
  </footer>

<script>
(() => {
  "use strict";
  const chat   = document.getElementById("chat");
  const empty  = document.getElementById("empty");
  const input  = document.getElementById("input");
  const sendBtn= document.getElementById("send");
  const hint   = document.getElementById("hint");
  const modeSwitch = document.getElementById("modeSwitch");
  const backendInfo = document.getElementById("backendInfo");

  let currentMode = null;
  let busy = false;

  // --- helpers -------------------------------------------------------------
  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }
  function scrollDown() { document.getElementById("main").scrollTop = 1e9; }

  function addUser(text) {
    if (empty.parentNode) empty.remove();
    const m = el("div", "msg user");
    m.appendChild(el("div", "bubble", text));
    chat.appendChild(m);
    scrollDown();
  }

  // Returns the message element so we can replace its contents when the reply
  // arrives (typing indicator -> answer).
  function addAssistantPlaceholder() {
    const m = el("div", "msg assistant");
    const b = el("div", "bubble");
    b.appendChild(el("span", "typing", "thinking…"));
    m.appendChild(b);
    chat.appendChild(m);
    scrollDown();
    return m;
  }

  function backendBadge(backend) {
    const cls = backend === "ollama" ? "ollama" : backend === "claude" ? "claude" : "retrieval";
    const label = backend === "retrieval" ? "retrieval (no LLM)" : backend;
    return el("span", "badge " + cls, label);
  }

  function renderAssistant(m, data) {
    m.innerHTML = "";
    const bubble = el("div", "bubble");

    if (data.mode === "find") {
      // find mode: no generated answer — show the retrieved snippets.
      bubble.appendChild(el("div", null,
        (data.chunks && data.chunks.length)
          ? "Top matches from your files:"
          : "No relevant content was found."));
      (data.chunks || []).forEach(c => {
        const s = el("div", "snippet");
        s.appendChild(el("span", "fn", c.filename || "(unknown)"));
        const txt = c.text || "";
        s.appendChild(document.createTextNode(txt.slice(0, 240) + (txt.length > 240 ? "…" : "")));
        bubble.appendChild(s);
      });
    } else {
      bubble.textContent = data.answer || "(empty response)";
    }
    m.appendChild(bubble);

    // meta row: backend badge + source filenames
    const meta = el("div", "meta");
    if (data.backend) meta.appendChild(backendBadge(data.backend));
    if (data.sources && data.sources.length) {
      const srcWrap = el("div", "sources");
      srcWrap.appendChild(el("span", null, "sources:"));
      data.sources.forEach(s => srcWrap.appendChild(el("span", "source", s)));
      meta.appendChild(srcWrap);
    }
    m.appendChild(meta);
    scrollDown();
  }

  function renderError(m, msg) {
    m.innerHTML = "";
    const bubble = el("div", "bubble");
    bubble.style.color = "var(--danger)";
    bubble.textContent = "Error: " + msg;
    m.appendChild(bubble);
  }

  // --- mode ----------------------------------------------------------------
  function paintMode(mode) {
    currentMode = mode;
    [...modeSwitch.children].forEach(b =>
      b.classList.toggle("active", b.dataset.mode === mode));
    hint.textContent = mode === "hetzner"
      ? "Hetzner: technical research assistant, grounded in your literature."
      : "Local: casual personal assistant that remembers your past chats.";
  }

  async function loadMode() {
    try {
      const d = await (await fetch("/mode")).json();
      paintMode(d.mode);
    } catch (e) { paintMode("local"); }
  }

  async function setMode(mode) {
    if (mode === currentMode) return;
    try {
      const r = await fetch("/mode", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mode })
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail || "failed");
      paintMode(d.mode);
    } catch (e) {
      hint.textContent = "Could not switch mode: " + e.message;
    }
  }

  modeSwitch.addEventListener("click", e => {
    const btn = e.target.closest("button[data-mode]");
    if (btn) setMode(btn.dataset.mode);
  });

  // --- backend info in header ----------------------------------------------
  async function loadHealth() {
    try {
      const d = await (await fetch("/health")).json();
      backendInfo.textContent = "· backend: " + d.backend;
    } catch (e) {}
  }

  // --- sending -------------------------------------------------------------
  async function send() {
    const text = input.value.trim();
    if (!text || busy) return;
    busy = true; sendBtn.disabled = true;
    addUser(text);
    input.value = ""; input.style.height = "auto";
    const placeholder = addAssistantPlaceholder();

    try {
      const r = await fetch("/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: text })
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail || ("HTTP " + r.status));
      renderAssistant(placeholder, d);
    } catch (e) {
      renderError(placeholder, e.message);
    } finally {
      busy = false; sendBtn.disabled = false; input.focus();
    }
  }

  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });

  // --- init ----------------------------------------------------------------
  loadMode();
  loadHealth();
  input.focus();
})();
</script>
</body>
</html>
